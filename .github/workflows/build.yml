name: Build WPF Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore TimeTrackerWPF.csproj

      - name: Publish application
        run: dotnet publish TimeTrackerWPF.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true

      - name: Download and install Inno Setup
        run: |
          $innoSetupUrl = "https://files.jrsoftware.org/is/6/innosetup-6.2.2.exe"
          Invoke-WebRequest -Uri $innoSetupUrl -OutFile "innosetup-installer.exe" -UseBasicParsing
          Start-Process -FilePath ".\innosetup-installer.exe" -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/SP-" -Wait
          Start-Sleep -Seconds 5

      - name: Verify Inno Setup installation
        run: |
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $isccPath) {
            Write-Host "Inno Setup found at: $isccPath"
          } else {
            Write-Error "Inno Setup not found!"
            exit 1
          }

      - name: Create installer with Inno Setup
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc TimeTrackerWPFSetup.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Inno Setup compilation failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Upload standalone executable
        uses: actions/upload-artifact@v4
        with:
          name: TimeTrackerWPF-Portable
          path: bin/Release/net8.0-windows/win-x64/publish/TimeTrackerWPF.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TimeTrackerWPF-Installer
          path: TimeTrackerWPFSetup_v*.exe
